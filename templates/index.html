<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Study Coach</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>🎓 Voice AI Study Coach</h1>
        <p class="subtitle">Ask me anything — math, science, history, programming and more</p>

        <!-- Subject Selector -->
        <div id="subject-selector">
            <p class="subject-title">What would you like to study today?</p>
            <div class="subject-grid">
                <button class="subject-btn" onclick="selectSubject('Math', this)">🔢 Math</button>
                <button class="subject-btn" onclick="selectSubject('Science', this)">🔬 Science</button>
                <button class="subject-btn" onclick="selectSubject('History', this)">📖 History</button>
                <button class="subject-btn" onclick="selectSubject('Programming', this)">💻 Programming</button>
                <button class="subject-btn" onclick="selectSubject('Geography', this)">🌍 Geography</button>
                <button class="subject-btn" onclick="selectSubject('English', this)">📝 English</button>
                <button class="subject-btn" onclick="selectSubject('Chemistry', this)">⚗️ Chemistry</button>
                <button class="subject-btn" onclick="selectSubject('Biology', this)">🧬 Biology</button>
                <button class="subject-btn active" onclick="selectSubject('Any Subject', this)">🎯 Any Subject</button>
            </div>
        </div>

        <div class="chat-box" id="chat-box">
            <div class="message coach">
                <div class="label">Coach</div>
                <div class="text">Hello! I'm your AI study coach. Pick a subject above and hold the mic button to ask me anything! 🎓</div>
            </div>
        </div>

        <div id="waveform" style="display:none">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>

        <div id="thinking" style="display:none">
            <div class="thinking-spinner"></div>
            <span class="thinking-text">Coach is thinking...</span>
        </div>

        <div id="speaking" style="display:none">
            <div class="speak-bar"></div>
            <div class="speak-bar"></div>
            <div class="speak-bar"></div>
            <div class="speak-bar"></div>
            <div class="speak-bar"></div>
            <span class="speaking-text">Coach is speaking...</span>
        </div>

        <button class="mic-btn" id="mic-btn"
            onmousedown="startRecording()"
            onmouseup="stopRecording()"
            ontouchstart="startRecording()"
            ontouchend="stopRecording()">🎤</button>

        <div class="status" id="status">Hold the button and speak</div>
        <button class="reset-btn" onclick="resetSession()">↺ New Session</button>
    </div>

    <script src="/static/script.js?v=5"></script>
</body>
</html>
